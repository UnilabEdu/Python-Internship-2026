{% from 'macros.html' import render_product %}
{% extends 'base.html' %}

{% block header %}
<header>
    <div id="carouselExample" class="carousel slide">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="https://usa.yamaha.com/files/Grands_Banner_1920px_1ee33fcaec559d8c286d2ad567055166.jpg"
                     class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item">
                <img src="https://usa.yamaha.com/files/Uprights_Banner_1920px_d5604bfeec2eb29425307aa05b3f7bbd.jpg"
                     class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item">
                <img src="https://usa.yamaha.com/files/Hybrid_Banner_1920px_111309f7574595564d7a07c0bd1f62a6.jpg"
                     class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item">
                <img src="https://usa.yamaha.com/files/Hybrid_Banner_1920px_111309f7574595564d7a07c0bd1f62a6.jpg"
                     class="d-block w-100" alt="...">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>
</header>
{% endblock %}

{% block main %}
<main>
    <h1 class="display-4 mx-3 mt-3 mb-5">{{ title }}</h1>
    <div class="container text-center">
        <div class="row">
            {% for product in products %}
                {{ render_product(product) }}
            {% endfor %}
        </div>
    </div>
</main>
{% endblock %}
