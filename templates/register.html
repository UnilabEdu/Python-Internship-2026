{% extends "base.html" %}

{% block header %}
<main class="container my-5" style="margin-top: 100px !important;">
    <div class="row justify-content-center">
        <div class="col-md-8 card p-5 shadow-sm bg-white text-center">

            <nav class="mb-4">
                <a href="/" class="text-decoration-none btn btn-outline-secondary btn-sm">
                    მთავარ გვერდზე დაბრუნება
                </a>
            </nav>

            <h2 class="fw-bold mb-4">სრულფასოვანი რეგისტრაციისთვის საჭიროა შეავსოთ ქვემოთ მითითებული ორი სახის
                ინფორმაცია:</h2>

            <hr class="my-4">

            <div class="row mt-5">
                <div class="col-md-6 mb-4">
                    <div
                        class="p-3 border rounded h-100 bg-light d-flex flex-column align-items-center justify-content-between">
                        <a href="{{ url_for('register_owner') }}"
                            class="fs-5 fw-bold text-success text-decoration-none mb-3">

                            👤 ცხოველის მფლობელის რეგისტრაცია

                            <img src="{{ url_for('static', filename='Picture1.png') }}" alt="მფლობელი"
                                class="img-fluid">

                        </a>
                    </div>
                </div>

                <div class="col-md-6 mb-4">
                    <div
                        class="p-3 border rounded h-100 bg-light d-flex flex-column align-items-center justify-content-between">

                        <a href="{{ url_for('register_animal') }}"
                            class="fs-5 fw-bold text-success text-decoration-none mb-3">
                            🐾 ცხოველის რეგისტრაცია
                        </a>

                        <img src="{{ url_for('static', filename='Picture2.png') }}" alt="ცხოველი" class="img-fluid">

                    </div>
                </div>
            </div>
        </div>
    </div>

    </div>
    </div>
</main>
{% endblock %}
