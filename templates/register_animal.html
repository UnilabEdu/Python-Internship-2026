{% extends "base.html" %}

{% block header %}

<main class="container my-5 text-start" style="max-width: 600px; margin-top: 100px !important;">
    
    <nav class="mb-4">
        <a href="index.html" class="text-decoration-none">
            <h5 class="text-muted">↩ უკან დაბრუნება</h5>
        </a>
    </nav>

    <div class="card p-4 shadow-sm bg-white">
        <h2 class="text-center mb-4">ცხოველის რეგისტრაცია</h2>

        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='Picture2.png') }}"
     alt="ცხოველი"
     class="img-fluid"
     style="max-height: 120px;">
        </div>

        <h4 class="text-secondary mb-4">გთხოვთ, შეიყვანეთ მითითებული ინფორმაცია:</h4>

        <form>
            <div class="mb-4">
                <label class="form-label d-block fw-bold">ცხოველის სახეობა:</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="animal" id="dog" required>
                    <label class="form-check-label" for="dog">ძაღლი</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="animal" id="cat">
                    <label class="form-check-label" for="cat">კატა</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="animal" id="hamster">
                    <label class="form-check-label" for="hamster">ზაზუნა</label>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">სახელი</label>
                <input type="text" class="form-control" placeholder="შეიყვანეთ სახელი" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">ასაკი</label>
                <input type="number" class="form-control" placeholder="შეიყვანეთ ასაკი" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">დაბადების თარიღი</label>
                <input type="date" class="form-control" required>
            </div>

            <div class="mb-4">
                <label class="form-label d-block fw-bold">სქესი:</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="genderF" required>
                    <label class="form-check-label" for="genderF">მდედრობითი</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="genderM">
                    <label class="form-check-label" for="genderM">მამრობითი</label>
                </div>
            </div>

            <button type="submit" class="btn btn-success w-100">რეგისტრაცია</button>
        </form>
    </div>
</main>
{% endblock %}
