{% extends "base.html" %}

{% block header%}

    <header style="margin-top: 70px;">
        <div id="carouselExampleCaptions" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="https://static.vecteezy.com/system/resources/thumbnails/069/822/727/small/cute-tabby-cat-relaxing-on-red-sofa-with-bokeh-lights-photo.jpg"
                        class="d-block w-100" alt="...">

                    <div class="carousel-caption d-none d-md-block">
                        <h5>ცხოველების რეგისტრაცია</h5>
                        <p>დაარეგისტრირეთ თქვენი კატა მარტივად და სწრაფად.</p>
                    </div>
                </div>
                <div class="carousel-item ">
                    <img src="https://cdn.1tv.ge/app/uploads/2018/04/sad-puppy-1522856657-1024x681.jpg"
                        class="d-block w-100" alt="...">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>ცხოველების რეგისტრაცია</h5>
                        <p>დაარეგისტრირეთ თქვენი ძაღლი მარტივად და სწრაფად.</p>
                    </div>
                </div>
                <div class="carousel-item ">
                    <img src="https://static.wixstatic.com/media/c7aa4ede3378f0cec372a83b2bf88204.jpg/v1/fill/w_630,h_360,al_c,q_80,usm_0.66_1.00_0.01/c7aa4ede3378f0cec372a83b2bf88204.jpg"
                        class="d-block w-100" alt="...">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>ცხოველების რეგისტრაცია</h5>
                        <p>დაარეგისტრირეთ თქვენი ზაზუნა მარტივად და სწრაფად.</p>
                    </div>
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions"
                data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions"
                data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>
    </header>
    {% endblock %}
