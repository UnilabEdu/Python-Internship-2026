{% extends 'base.html' %}
{% from 'macros.html' import render_product with context %}

{% block main %}
<main>
    <h1 class="display-4 mx-3 mt-3 mb-5">{{ title }}</h1>
    <div class="container text-center">
        <div class="row">
            {% for product in products %}
                {{ render_product(product) }}
            {% endfor %}
        </div>
    </div>
</main>
{% endblock %}
