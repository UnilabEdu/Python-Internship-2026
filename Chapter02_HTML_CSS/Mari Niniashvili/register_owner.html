<!DOCTYPE html>
<html lang="en">

<head>
    <title>მფლობელის რეგისტრაცია </title>
    <link rel="stylesheet" href="style.css">

<body>
    <nav><a href="register.html">
            <h3>უკან დაბრუნება</h3>
        </a></nav>

    <main>
        <h2>შინაური ცხოველების აღრიცხვა: ცხოველის მფლობელის რეგისტრაცია</h2>
        <img src="Picture1.png" alt="">
        <h3> გთხოვთ, შეიყვანეთ მითითებული ინფორმაცია: </h3>
        <form>
            <div class="text-input">
                <label> თქვენი სახელი </label>
                <input type="text" required><br>
                <label>თქვენი გვარი</label>
                <input type="text" required><br>

            </div>

            <div class="date-input">
                <label>დაბადების თარიღი<label>
                        <input type="date" required><br>
                        <label>ელ.ფოსტის მისამართი<label>
                                <input type="text" required><br>
                                <label>ქალაქი<label></label>
                                    <select>
                                        <option>თბილისი</option>
                                        <option>ბათუმი</option>
                                        <option>ქუთაისი</option>
                                    </select>
                                    <br><label>საცხოვრებელი მისამართი მისამართი<label>
                                            <input type="text" required><br>
                                            <label>მდედრობითი</label>
                                            <input type="radio" name="gender" required>
                                            <label>მამრობითი</label>
                                            <input type="radio" name="gender" required><br>
                                            <textarea
                                                placeholder="შეგიძლია გვიამბო შენს შესახებ">შეგიძლია გვიამბო შენს შესახებ</textarea>
                                            <br>
                                            <br>
            </div>


            <button type="submit">რეგისტრაცია</button>

        </form>


    </main>

    <body>

        <footer id="bottom">
            <h3>ხშირად დასმული კითხვები FAQ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; კონტაქტი </h3>
        </footer>
    </body>

</html>
