<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <title>რეგისტრაცია</title>
        <link rel="stylesheet" href="style.css">
    </head>
<body>
    <h2>გაიარე რეგისტრაცია</h2>
    <h4>
    <a href="index.html">უკან დაბრუნება</a>
    </h4>
</body>

<form>
    <div class="text-input">
        <label>თქვენი სახელი?</label>
        <input type="text" placeholder="სახელი" required> <br>
        <label>რას დააყენებთ პაროლად?</label>
        <input type="password" placeholder="არ დაგავიწყდე" required>
    </div>
    <div class="text-input">
        <label>როდის გაქვს დაბადების დღე?</label> 
        <input type="date"><br>
        <label>მითხარი აბა მეილი </label>
        <input type="email" placeholder ="მეილიი"><br>
        <label>გიყვარს ცხოველები?</label>
        <input type="checkbox" required>
    </div>
    <br>

    <button type="submit">რეგისტრაცია</button> 

    
</form>
</html>
