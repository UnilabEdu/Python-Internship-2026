<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>რეგისტრაცია</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
გაიარე რეგისტრაცია

<form>
    <div class="text-input">
        <label>შეიყვანე სახელი: </label>
        <input type="text" placeholder="შენი სახელი" required> <br>
        <label>შეიყვანე პაროლი: </label>
        <input type="password" required> <br>
    </div>

    <div class="date-input">
        <label>შეიყვანე დაბადების თარიღი</label>
        <input type="date"> <br>
        <label>რომელი პროგრამირების ენებბი იცი?</label><br>
        <label>Python: </label>
        <input type="checkbox"> <br>
        <label>C++: </label>
        <input type="checkbox"> <br>
        <label>Java: </label>
        <input type="checkbox"> <br>
    </div>


    <label>ქალი:</label>
    <input type="radio" name="gender"><br>
    <label>კაცი:</label>
    <input type="radio" name="gender"> <br>

    <label>აირჩიე ქალაქი</label>
    <select>
        <option>
            თბილისი
        </option>
        <option>
            ხაშური
        </option>
        <option>
            ბათუმი
        </option>
    </select>
    <br>
    <textarea placeholder="გვიამბე შენს შესახებ">

        </textarea> <br>

    <button type="submit">
        რეგისტრაცია
    </button>

</form>
</body>
</html>
